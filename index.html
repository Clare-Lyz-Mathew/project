
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyza Events | Sophisticated Event Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'space-indigo': '#22223b',
                        'dusty-grape': '#4a4e69',
                        'lilac-ash': '#9a8c98',
                        'almond-silk': '#c9ada7',
                        'seashell': '#f2e9e4',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'pop-up': 'popUp 4s ease-in-out forwards',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        popUp: {
                            '0%': { transform: 'translateY(20px) scale(0.8)', opacity: '0' },
                            '10%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '90%': { transform: 'translateY(-20px) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(-40px) scale(0.9)', opacity: '0' },
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(34, 34, 59, 0.08)',
                        'soft-lg': '0 8px 30px rgba(34, 34, 59, 0.12)',
                        'twilight': '0 4px 20px rgba(74, 78, 105, 0.15)',
                    },
                    borderRadius: {
                        'refined': '12px',
                        'soft': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f2e9e4;
            scroll-behavior: smooth;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .translucent-overlay {
            background: rgba(34, 34, 59, 0.85);
            backdrop-filter: blur(8px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f2e9e4;
        }
        ::-webkit-scrollbar-thumb {
            background: #9a8c98;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4e69;
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
    </style>
