
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyza Events | Sophisticated Event Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'navy': '#29304C',
                        'slate': '#5D627A',
                        'plum': '#89758C',
                        'mauve': '#AA91A1',
                        'mist': '#ECDAE8',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'pop-up': 'popUp 4s ease-in-out forwards',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        popUp: {
                            '0%': { transform: 'translateY(20px) scale(0.8)', opacity: '0' },
                            '10%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '90%': { transform: 'translateY(-20px) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(-40px) scale(0.9)', opacity: '0' },
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(41, 48, 76, 0.2)',
                        'soft-lg': '0 8px 30px rgba(41, 48, 76, 0.3)',
                        'twilight': '0 4px 20px rgba(93, 98, 122, 0.4)',
                    },
                    borderRadius: {
                        'refined': '12px',
                        'soft': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #ECDAE8;
            background-image: 
              linear-gradient(rgba(236, 218, 232, 0.88), rgba(236, 218, 232, 0.88)),
              url('/gallery/birthday_addon_hero.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            scroll-behavior: smooth;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .translucent-overlay {
            background: rgba(34, 34, 59, 0.85);
            backdrop-filter: blur(8px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f2e9e4;
        }
        ::-webkit-scrollbar-thumb {
            background: #9a8c98;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4e69;
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
    </style></head>
<body>
    <div id="root"></div>
<script type="module" src="/src/index.jsx"></script>
</body>
</html>
